import org.jetbrains.kotlin.gradle.dsl.JvmTarget
import org.jetbrains.kotlin.gradle.tasks.KotlinJvmCompile
import org.jlleitschuh.gradle.ktlint.reporter.ReporterType

plugins {
    id 'com.google.devtools.ksp' version '2.3.6' apply false
    id 'com.vanniktech.maven.publish' version '0.36.0'
    id 'jacoco-report-aggregation'
    id 'org.jetbrains.dokka' version '2.2.0'
    id 'org.jetbrains.kotlin.jvm' version '2.3.10'
    id 'org.jetbrains.kotlin.plugin.serialization' version '2.3.10'
    id 'org.jlleitschuh.gradle.ktlint' version '14.2.0'
    id 'org.sonarqube' version '7.2.3.7755'
    id 'pl.allegro.tech.build.axion-release' version '1.21.1'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation project(':lirp-api')
    implementation project(':lirp-core')
    implementation project(':lirp-sql')
    implementation project(':lirp-fx')
}

kotlin {
    jvmToolchain(21)
}

tasks.named('jar') {
    enabled = false
}

scmVersion {
    tag {
        prefix = ''
        initialVersion { t, p -> '1.0.0' }
    }
    useHighestVersion = true
    ignoreUncommittedChanges = false
    versionIncrementer((project.findProperty('versionIncrement') ?: 'incrementMinor') as String)
}

tasks.withType(PublishToMavenLocal).configureEach {
    onlyIf { project != rootProject }
}

version = scmVersion.version
description = 'LIRP - Lightweight Reactive Persistence. An asynchronous, non-blocking, reactive persistence library for Java and Kotlin.'

sonar {
    properties {
        property 'sonar.host.url', 'https://sonarcloud.io'
        property 'sonar.organization', 'transgressoft'
        property 'sonar.projectKey', 'octaviospain_lirp'
        property 'sonar.projectName', 'lirp'
        property 'sonar.projectVersion', version
        property 'sonar.junit.reportPaths', 'build/test-results/test,build/test-results/integrationTest'
        def buildDir = project.layout.buildDirectory.get().asFile.absolutePath
        property 'sonar.coverage.jacoco.xmlReportPaths', "${buildDir}/reports/jacoco/testCodeCoverageReport/testCodeCoverageReport.xml"
    }
}

tasks.named('check') {
    dependsOn tasks.named('testCodeCoverageReport')
}

subprojects {

    apply plugin: 'com.vanniktech.maven.publish'
    apply plugin: 'jacoco'
    apply plugin: 'kotlin'
    apply plugin: 'org.jetbrains.dokka'
    apply plugin: 'org.jetbrains.kotlin.plugin.serialization'
    apply plugin: 'org.jlleitschuh.gradle.ktlint'
    apply plugin: 'org.sonarqube'

    group = 'net.transgressoft'
    project.version = rootProject.version

    dependencies {
        implementation platform(libs.kotlin.bom)
        api platform(libs.coroutines.bom)
        api libs.coroutines.core
    }

    repositories {
        mavenCentral()
        maven { url = 'https://jitpack.io' }
    }

    afterEvaluate {
        def metadataTask = tasks.findByName('generateMetadataFileForMavenPublication')
        if (metadataTask != null) {
            metadataTask.dependsOn tasks.named('dokkaJavadocJar')
        }
    }

    kotlin {
        jvmToolchain(21)
    }

    tasks.withType(KotlinJvmCompile).configureEach {
        compilerOptions {
            jvmTarget.set(JvmTarget.JVM_21)
            freeCompilerArgs.add('-Xjsr305=strict')
        }
    }

    sonar {
        properties {
            property 'sonar.moduleKey', "${project.name}"
            property 'sonar.sources', 'src/main'
            property 'sonar.test.exclusions', 'src/test/**,src/integrationTest/**, src/testFixtures/**'
        }
    }

    ktlint {
        reporters {
            reporter(ReporterType.HTML)
        }
    }

    test {
        useJUnitPlatform()
        testLogging {
            events 'passed', 'skipped', 'failed'
        }
    }

    tasks.withType(Test).configureEach {
        // These --add-opens flags are required only for the reflection fallback path in
        // LirpEntitySerializer when entities are NOT processed by KSP. Once all entities use
        // KSP-generated LirpFxScalarAccessor, these flags can be removed.
        jvmArgs '--add-opens=java.base/java.lang=ALL-UNNAMED',
                '--add-opens=java.base/sun.nio.ch=ALL-UNNAMED',
                '--add-opens=java.base/java.io=ALL-UNNAMED'
    }

    jacocoTestReport {
        reports {
            xml.required = true
            html.required = true
        }
    }

    check.dependsOn jacocoTestReport

    mavenPublishing {
        publishToMavenCentral()
        coordinates("${project.group}", "${project.name}", "${project.version}")
        pom {
            name = "${project.name}"
            description = project.description
            url = 'https://github.com/octaviospain/lirp'
            inceptionYear = '2025'

            licenses {
                license {
                    name = 'GNU General Public License v3'
                    url = 'https://www.gnu.org/licenses/gpl-3.0.en.html'
                }
            }

            developers {
                developer {
                    id = 'transgressoft'
                    name = 'Octavio Calleya Garcia'
                    email = 'octavio@transgressoft.net'
                    organization = 'transgressoft'
                    organizationUrl = 'https://transgressoft.net'
                }
            }

            scm {
                connection = 'scm:git:git://github.com/octaviospain/lirp.git'
                developerConnection = 'scm:git:ssh://github.com:octaviospain/lirp.git'
                url = 'https://github.com/octaviospain/lirp/tree/master'
            }
        }
        signAllPublications()
    }
}
